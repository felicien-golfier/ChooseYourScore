<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ChooseYourScore — Éditeur</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #f0f4f8;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Top bar ── */
    .topbar {
      background: white;
      border-bottom: 1px solid #e2e8f0;
      padding: 14px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-shrink: 0;
    }
    .topbar .logo { font-weight: 700; font-size: 1.05rem; color: #0f172a; }
    .topbar .page-title { color: #64748b; font-size: 0.9rem; }
    .topbar nav { display: flex; gap: 8px; margin-left: auto; }
    .topbar nav a {
      color: #3b82f6; text-decoration: none; font-size: 0.88rem; font-weight: 500;
      padding: 6px 12px; border-radius: 6px; transition: background 0.1s;
    }
    .topbar nav a:hover { background: #eff6ff; }

    /* ── Layout ── */
    .layout {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── Sidebar ── */
    .sidebar {
      width: 260px;
      background: white;
      border-right: 1px solid #e2e8f0;
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }
    .sidebar-header {
      padding: 18px 16px 12px;
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid #e2e8f0;
    }
    .sidebar-header h2 { font-size: 0.95rem; color: #334155; font-weight: 600; }

    .btn-icon {
      width: 30px; height: 30px;
      border: none; border-radius: 7px;
      background: #3b82f6; color: white;
      font-size: 1.3rem; line-height: 1;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: background 0.15s;
    }
    .btn-icon:hover { background: #2563eb; }

    .exercise-list { flex: 1; overflow-y: auto; padding: 8px; }
    .exercise-item {
      padding: 10px 12px;
      border-radius: 8px;
      cursor: pointer;
      color: #334155;
      font-size: 0.92rem;
      transition: background 0.1s;
      display: flex; align-items: center; gap: 8px;
    }
    .exercise-item:hover { background: #f1f5f9; }
    .exercise-item.active { background: #eff6ff; color: #1d4ed8; font-weight: 600; }
    .exercise-item .pair-count {
      margin-left: auto; font-size: 0.75rem;
      color: #94a3b8; background: #f1f5f9;
      border-radius: 10px; padding: 1px 8px;
    }
    .exercise-item.active .pair-count { background: #dbeafe; color: #3b82f6; }

    .sidebar-footer { padding: 12px 16px; border-top: 1px solid #e2e8f0; }
    .import-export { display: flex; gap: 8px; }
    .import-export button {
      flex: 1; padding: 8px 6px; font-size: 0.78rem;
      border: 1px solid #e2e8f0; border-radius: 6px;
      background: white; color: #475569; cursor: pointer;
      font-family: inherit; transition: background 0.1s;
    }
    .import-export button:hover { background: #f1f5f9; }

    /* ── Main panel ── */
    .main-panel { flex: 1; overflow-y: auto; padding: 32px; }

    .empty-state {
      text-align: center; color: #94a3b8;
      padding: 80px 40px;
    }
    .empty-state p { font-size: 1.1rem; margin-bottom: 6px; }
    .empty-state small { font-size: 0.88rem; }

    /* ── Exercise editor ── */
    #exercise-editor { max-width: 760px; }

    .editor-header {
      display: flex; align-items: center; gap: 12px;
      margin-bottom: 24px;
    }
    .editor-header input {
      flex: 1;
      font-size: 1.35rem; font-weight: 700; color: #0f172a;
      border: none; border-bottom: 2px solid #e2e8f0;
      padding: 6px 2px; outline: none; background: transparent;
      transition: border-color 0.15s; font-family: inherit;
    }
    .editor-header input:focus { border-color: #3b82f6; }

    .btn-danger {
      padding: 8px 16px; border: 1px solid #fca5a5;
      border-radius: 8px; background: white; color: #dc2626;
      font-size: 0.82rem; cursor: pointer; font-weight: 500;
      white-space: nowrap; font-family: inherit; transition: background 0.1s;
    }
    .btn-danger:hover { background: #fef2f2; }

    .form-group { margin-bottom: 28px; }
    .form-group label {
      display: block; font-weight: 600; color: #334155;
      font-size: 0.88rem; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.04em;
    }
    .form-group textarea {
      width: 100%; padding: 12px 14px;
      border: 2px solid #e2e8f0; border-radius: 10px;
      font-size: 1rem; resize: vertical; outline: none;
      font-family: inherit; color: #0f172a;
      transition: border-color 0.15s;
    }
    .form-group textarea:focus { border-color: #3b82f6; }

    .pairs-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 14px;
    }
    .pairs-header h3 { font-size: 0.88rem; color: #334155; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; }
    .badge {
      background: #f1f5f9; color: #64748b;
      border-radius: 12px; padding: 2px 10px;
      font-size: 0.78rem; font-weight: 500;
    }

    .pairs-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 16px; }

    .pair-row {
      background: white; border: 1.5px solid #e2e8f0; border-radius: 12px;
      padding: 12px 14px; display: flex; align-items: center; gap: 12px;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .pair-row:hover { border-color: #93c5fd; box-shadow: 0 1px 6px rgba(59,130,246,0.08); }

    .pair-preview {
      flex: 1; display: flex; align-items: center; gap: 12px; min-width: 0;
    }
    .pair-item-preview {
      flex: 1; padding: 8px 12px; background: #f8fafc; border-radius: 8px;
      text-align: center; min-height: 48px;
      display: flex; align-items: center; justify-content: center;
      word-break: break-word; overflow: hidden; min-width: 0;
    }
    .pair-item-preview.is-correct {
      background: #f0fdf4; border: 1.5px solid #86efac;
    }
    .pair-vs { color: #cbd5e1; font-size: 0.75rem; font-weight: 700; flex-shrink: 0; }

    .pair-actions { display: flex; align-items: center; gap: 4px; flex-shrink: 0; }
    .pair-action-btn {
      width: 28px; height: 28px;
      border: 1px solid #e2e8f0; border-radius: 6px;
      background: white; color: #64748b; font-size: 0.82rem;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: all 0.1s; font-family: inherit;
    }
    .pair-action-btn:hover { background: #f1f5f9; color: #0f172a; }
    .pair-action-btn:disabled { opacity: 0.35; cursor: default; }
    .pair-action-btn.edit:hover   { background: #eff6ff; color: #2563eb; border-color: #93c5fd; }
    .pair-action-btn.delete:hover { background: #fef2f2; color: #dc2626; border-color: #fca5a5; }

    .btn-add-pair {
      width: 100%; padding: 13px;
      border: 2px dashed #cbd5e1; border-radius: 12px;
      background: transparent; color: #64748b; font-size: 0.95rem;
      cursor: pointer; transition: all 0.15s; font-family: inherit;
    }
    .btn-add-pair:hover { border-color: #3b82f6; color: #3b82f6; background: #f8faff; }

    /* ── Modal ── */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(15,23,42,0.5);
      display: flex; align-items: center; justify-content: center;
      z-index: 100; padding: 24px;
    }
    .modal {
      background: white; border-radius: 20px; padding: 32px;
      width: 100%; max-width: 840px; max-height: 92vh; overflow-y: auto;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
      animation: modalIn 0.2s ease;
    }
    @keyframes modalIn {
      from { opacity: 0; transform: scale(0.96) translateY(8px); }
      to   { opacity: 1; transform: none; }
    }
    .modal h3 { font-size: 1.15rem; color: #0f172a; margin-bottom: 20px; }

    /* Live preview */
    .modal-preview {
      display: grid; grid-template-columns: 1fr 1fr; gap: 16px;
      background: #f8fafc; border: 1.5px solid #e2e8f0; border-radius: 14px;
      padding: 20px; margin-bottom: 28px;
    }
    .preview-box {
      background: white; border: 2px solid #e2e8f0; border-radius: 12px;
      min-height: 100px; display: flex; align-items: center; justify-content: center;
      padding: 16px; text-align: center; word-break: break-word;
    }
    .preview-box.correct-side { border-color: #86efac; background: #f0fdf4; }

    /* Two-column item editor + correct selector */
    .items-edit-grid {
      display: grid; grid-template-columns: 1fr auto 1fr; gap: 24px;
      align-items: start; margin-bottom: 28px;
    }
    .item-edit-panel h4 {
      font-size: 0.88rem; font-weight: 600; color: #334155;
      margin-bottom: 14px; text-transform: uppercase; letter-spacing: 0.04em;
    }
    .field-row { margin-bottom: 12px; }
    .field-row label { display: block; font-size: 0.78rem; color: #64748b; margin-bottom: 4px; font-weight: 500; }
    .field-row input[type="text"],
    .field-row select {
      width: 100%; padding: 8px 10px;
      border: 1.5px solid #e2e8f0; border-radius: 8px;
      font-size: 0.9rem; outline: none; font-family: inherit; color: #0f172a;
      transition: border-color 0.15s;
    }
    .field-row input[type="text"]:focus,
    .field-row select:focus { border-color: #3b82f6; }
    .field-row input[type="color"] {
      width: 100%; height: 38px;
      border: 1.5px solid #e2e8f0; border-radius: 8px;
      padding: 3px 5px; cursor: pointer;
    }

    .correct-selector {
      display: flex; flex-direction: column; align-items: center;
      padding-top: 32px; gap: 14px;
    }
    .correct-selector .cs-label {
      font-size: 0.78rem; color: #64748b; font-weight: 600;
      text-align: center; text-transform: uppercase; letter-spacing: 0.04em;
    }
    .radio-option {
      display: flex; align-items: center; gap: 6px;
      cursor: pointer; font-size: 0.9rem; color: #334155;
      padding: 8px 14px; border-radius: 8px; transition: background 0.1s;
    }
    .radio-option:hover { background: #f1f5f9; }
    .radio-option input { width: 16px; height: 16px; cursor: pointer; }

    .modal-actions {
      display: flex; gap: 12px; justify-content: flex-end;
      border-top: 1px solid #e2e8f0; padding-top: 20px;
    }
    .btn-save {
      padding: 11px 26px; background: #3b82f6; color: white;
      border: none; border-radius: 8px; font-size: 0.95rem; font-weight: 600;
      cursor: pointer; transition: background 0.15s; font-family: inherit;
    }
    .btn-save:hover { background: #2563eb; }
    .btn-cancel {
      padding: 11px 26px; background: #f1f5f9; color: #334155;
      border: none; border-radius: 8px; font-size: 0.95rem; font-weight: 500;
      cursor: pointer; transition: background 0.15s; font-family: inherit;
    }
    .btn-cancel:hover { background: #e2e8f0; }

    /* ── Mobile ────────────────────────────────────────────────────────────────── */
    @media (max-width: 768px) {
      /* Allow page to scroll on mobile */
      body { height: auto; overflow: auto; }

      .topbar { flex-wrap: wrap; gap: 8px; padding: 12px 16px; }
      .topbar nav { margin-left: 0; }

      /* Stack sidebar above main panel */
      .layout { flex-direction: column; overflow: visible; height: auto; }

      .sidebar {
        width: 100%;
        border-right: none;
        border-bottom: 1px solid #e2e8f0;
        flex-shrink: 0;
      }
      .exercise-list { max-height: 160px; }

      .main-panel { overflow-y: visible; padding: 20px 16px; }

      /* Modal: bottom sheet on mobile */
      .modal-overlay { padding: 0; align-items: flex-end; }
      .modal {
        border-radius: 20px 20px 0 0;
        max-height: 96vh;
        padding: 24px 16px 32px;
      }

      /* Items edit grid: single column */
      .items-edit-grid { grid-template-columns: 1fr; gap: 0; }

      .correct-selector {
        flex-direction: row;
        padding: 12px 0;
        justify-content: center;
        gap: 24px;
      }

      /* Preview: single column */
      .modal-preview { grid-template-columns: 1fr; }

      .modal-actions { flex-direction: column-reverse; gap: 8px; }
      .btn-save, .btn-cancel { width: 100%; text-align: center; }

      /* Arrow config grid */
      #arrow-config > div { grid-template-columns: 1fr !important; }
    }

    /* Arrow pair preview in modal */
    .arrow-preview-card {
      width: 100%; min-height: 160px; border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      font-size: 96px; line-height: 1; user-select: none;
    }
    .arrow-preview-card.bg-blue   { background: #3b82f6; color: white; }
    .arrow-preview-card.bg-yellow { background: #fbbf24; color: #1a1a1a; }
  </style>
</head>
<body>

<div class="topbar">
  <span class="logo">ChooseYourScore</span>
  <span class="page-title">Éditeur d'exercices</span>
  <nav>
    <a href="index.html">▶ Lancer un exercice</a>
    <a href="results.html">📊 Résultats</a>
  </nav>
</div>

<div class="layout">
  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sidebar-header">
      <h2>Exercices</h2>
      <button class="btn-icon" id="btn-new-exercise" title="Créer un exercice">+</button>
    </div>
    <div class="exercise-list" id="exercise-list"></div>
    <div class="sidebar-footer">
      <div class="import-export">
        <button id="btn-export">⬇ Exporter</button>
        <button id="btn-import">⬆ Importer</button>
        <input type="file" id="import-input" accept=".json" style="display:none">
      </div>
    </div>
  </div>

  <!-- Main panel -->
  <div class="main-panel">
    <div id="empty-state" class="empty-state">
      <p>Aucun exercice sélectionné</p>
      <small>Cliquez sur + pour créer votre premier exercice</small>
    </div>

    <div id="exercise-editor" style="display:none">
      <div class="editor-header">
        <input type="text" id="exercise-name" placeholder="Nom de l'exercice" maxlength="100">
        <button class="btn-danger" id="btn-delete-exercise">Supprimer</button>
      </div>

      <div class="form-group">
        <label for="exercise-instruction">Consigne affichée au patient</label>
        <textarea id="exercise-instruction" rows="3"
          placeholder="ex. Cliquez uniquement sur les animaux"></textarea>
      </div>

      <div class="pairs-header">
        <h3>Paires <span class="badge" id="pair-count-badge">0</span></h3>
      </div>
      <div class="pairs-list" id="pairs-list"></div>
      <button class="btn-add-pair" id="btn-add-pair">+ Ajouter une paire</button>
    </div>
  </div>
</div>

<!-- Pair edit modal -->
<div class="modal-overlay" id="pair-modal" style="display:none">
  <div class="modal">
    <h3>Modifier la paire</h3>

    <div class="modal-preview">
      <div class="preview-box" id="preview-left">(vide)</div>
      <div class="preview-box" id="preview-right">(vide)</div>
    </div>

    <!-- Type selector -->
    <div class="field-row" style="margin-bottom:20px">
      <label>Type de paire</label>
      <select id="pair-type">
        <option value="choice">Choix — item gauche / droite</option>
        <option value="arrow">Flèche directionnelle</option>
      </select>
    </div>

    <!-- Arrow config (hidden when type=choice) -->
    <div id="arrow-config" style="display:none; margin-bottom:28px">
      <div style="display:grid; grid-template-columns:1fr 1fr; gap:24px; margin-bottom:20px">
        <div class="field-row">
          <label>Direction de la flèche</label>
          <select id="arrow-direction">
            <option value="left">← Gauche</option>
            <option value="right">→ Droite</option>
            <option value="up">↑ Haut</option>
            <option value="down">↓ Bas</option>
          </select>
        </div>
        <div class="field-row">
          <label>Fond de la carte</label>
          <select id="arrow-bg">
            <option value="blue">Bleu (→ même sens)</option>
            <option value="yellow">Jaune (→ sens inverse)</option>
          </select>
        </div>
      </div>
      <div class="modal-preview">
        <div style="grid-column:1/-1; text-align:center">
          <div class="arrow-preview-card bg-blue" id="arrow-preview-card">←</div>
          <div style="margin-top:10px; font-size:0.88rem; color:#64748b" id="arrow-preview-hint"></div>
        </div>
      </div>
    </div>

    <div class="items-edit-grid" id="items-edit-grid">
      <!-- Left item -->
      <div class="item-edit-panel">
        <h4>Item gauche</h4>
        <div class="field-row">
          <label>Texte</label>
          <input type="text" id="left-text" placeholder="Texte affiché">
        </div>
        <div class="field-row">
          <label>Couleur</label>
          <input type="color" id="left-color" value="#1a1a1a">
        </div>
        <div class="field-row">
          <label>Taille (px)</label>
          <select id="left-size">
            <option value="16">16</option><option value="20">20</option>
            <option value="24">24</option><option value="28">28</option>
            <option value="32" selected>32</option><option value="40">40</option>
            <option value="48">48</option><option value="56">56</option>
            <option value="64">64</option><option value="72">72</option>
          </select>
        </div>
        <div class="field-row">
          <label>Police</label>
          <select id="left-font">
            <option value="Arial">Arial</option>
            <option value="Times New Roman">Times New Roman</option>
            <option value="Courier New">Courier New</option>
            <option value="Georgia">Georgia</option>
            <option value="Verdana">Verdana</option>
            <option value="Comic Sans MS">Comic Sans MS</option>
            <option value="Impact">Impact</option>
          </select>
        </div>
        <div class="field-row">
          <label>Casse</label>
          <select id="left-transform">
            <option value="none">Normale</option>
            <option value="uppercase">MAJUSCULES</option>
            <option value="lowercase">minuscules</option>
            <option value="capitalize">Capitalisé</option>
          </select>
        </div>
      </div>

      <!-- Correct selector -->
      <div class="correct-selector">
        <div class="cs-label">Réponse<br>correcte</div>
        <label class="radio-option">
          <input type="radio" name="modal-correct" id="correct-left" value="left">
          ← Gauche
        </label>
        <label class="radio-option">
          <input type="radio" name="modal-correct" id="correct-right" value="right">
          Droite →
        </label>
      </div>

      <!-- Right item -->
      <div class="item-edit-panel">
        <h4>Item droit</h4>
        <div class="field-row">
          <label>Texte</label>
          <input type="text" id="right-text" placeholder="Texte affiché">
        </div>
        <div class="field-row">
          <label>Couleur</label>
          <input type="color" id="right-color" value="#1a1a1a">
        </div>
        <div class="field-row">
          <label>Taille (px)</label>
          <select id="right-size">
            <option value="16">16</option><option value="20">20</option>
            <option value="24">24</option><option value="28">28</option>
            <option value="32" selected>32</option><option value="40">40</option>
            <option value="48">48</option><option value="56">56</option>
            <option value="64">64</option><option value="72">72</option>
          </select>
        </div>
        <div class="field-row">
          <label>Police</label>
          <select id="right-font">
            <option value="Arial">Arial</option>
            <option value="Times New Roman">Times New Roman</option>
            <option value="Courier New">Courier New</option>
            <option value="Georgia">Georgia</option>
            <option value="Verdana">Verdana</option>
            <option value="Comic Sans MS">Comic Sans MS</option>
            <option value="Impact">Impact</option>
          </select>
        </div>
        <div class="field-row">
          <label>Casse</label>
          <select id="right-transform">
            <option value="none">Normale</option>
            <option value="uppercase">MAJUSCULES</option>
            <option value="lowercase">minuscules</option>
            <option value="capitalize">Capitalisé</option>
          </select>
        </div>
      </div>
    </div>

    <div class="modal-actions">
      <button class="btn-cancel" id="btn-modal-cancel">Annuler</button>
      <button class="btn-save"   id="btn-modal-save">Enregistrer</button>
    </div>
  </div>
</div>

<script>
  const STORAGE_KEY    = 'cys_exercises';
  const ARROW_CHARS_ED = { left: '←', right: '→', up: '↑', down: '↓' };
  const OPPOSITE_ED    = { left: 'right', right: 'left', up: 'down', down: 'up' };

  function refreshArrowPreview() {
    const dir  = document.getElementById('arrow-direction').value;
    const bg   = document.getElementById('arrow-bg').value;
    const card = document.getElementById('arrow-preview-card');
    const hint = document.getElementById('arrow-preview-hint');
    card.textContent = ARROW_CHARS_ED[dir] || '?';
    card.className   = 'arrow-preview-card bg-' + bg;
    const correctDir = bg === 'blue' ? dir : OPPOSITE_ED[dir];
    hint.textContent = 'Réponse correcte : ' + (ARROW_CHARS_ED[correctDir] || '');
  }

  function getExercises() {
    return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
  }
  function saveExercises(exList) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(exList));
  }
  function newId(prefix) {
    return prefix + '_' + Date.now() + '_' + Math.random().toString(36).slice(2, 6);
  }
  function escapeHtml(str) {
    return String(str)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── State ─────────────────────────────────────────────────────────────────────
  let exercises          = [];
  let selectedExerciseId = null;
  let editingPairId      = null;

  function getSelected() {
    return exercises.find(ex => ex.id === selectedExerciseId) || null;
  }

  // ── Render sidebar ────────────────────────────────────────────────────────────
  function renderSidebar() {
    const list = document.getElementById('exercise-list');
    list.innerHTML = '';

    if (exercises.length === 0) {
      list.innerHTML =
        '<div style="padding:16px;color:#94a3b8;font-size:0.83rem;text-align:center">Aucun exercice</div>';
      return;
    }

    exercises.forEach(ex => {
      const div = document.createElement('div');
      div.className = 'exercise-item' + (ex.id === selectedExerciseId ? ' active' : '');

      const nameSpan = document.createElement('span');
      nameSpan.textContent = ex.name;
      nameSpan.style.overflow = 'hidden';
      nameSpan.style.textOverflow = 'ellipsis';
      nameSpan.style.whiteSpace = 'nowrap';

      const countSpan = document.createElement('span');
      countSpan.className = 'pair-count';
      countSpan.textContent = (ex.pairs || []).length;

      div.appendChild(nameSpan);
      div.appendChild(countSpan);
      div.addEventListener('click', () => selectExercise(ex.id));
      list.appendChild(div);
    });
  }

  // ── Render main editor ────────────────────────────────────────────────────────
  function renderEditor() {
    const ex = getSelected();
    const emptyState = document.getElementById('empty-state');
    const editor     = document.getElementById('exercise-editor');

    if (!ex) {
      emptyState.style.display = 'block';
      editor.style.display = 'none';
      return;
    }
    emptyState.style.display = 'none';
    editor.style.display = 'block';

    document.getElementById('exercise-name').value        = ex.name;
    document.getElementById('exercise-instruction').value = ex.instruction || '';
    document.getElementById('pair-count-badge').textContent = (ex.pairs || []).length;

    renderPairsList(ex);
  }

  function renderPairsList(ex) {
    const list  = document.getElementById('pairs-list');
    list.innerHTML = '';
    const pairs = ex.pairs || [];

    pairs.forEach((pair, index) => {
      const row = document.createElement('div');
      row.className = 'pair-row';

      // Preview
      const previewDiv = document.createElement('div');
      previewDiv.className = 'pair-preview';

      if (pair.type === 'arrow') {
        const chip = document.createElement('div');
        chip.className = 'pair-item-preview';
        chip.style.background = pair.bgColor === 'yellow' ? '#fef9c3' : '#dbeafe';
        chip.style.border = '1.5px solid ' + (pair.bgColor === 'yellow' ? '#fde047' : '#93c5fd');
        chip.style.fontSize = '24px';
        chip.textContent = ARROW_CHARS_ED[pair.direction] || '←';
        const lbl = document.createElement('span');
        lbl.style.cssText = 'font-size:0.8rem;color:#64748b;margin-left:8px';
        lbl.textContent = pair.bgColor === 'yellow' ? 'fond jaune' : 'fond bleu';
        previewDiv.appendChild(chip);
        previewDiv.appendChild(lbl);
      } else {
        previewDiv.appendChild(buildPreviewEl(pair.left, pair.correct === 'left'));
        const vs = document.createElement('span');
        vs.className = 'pair-vs';
        vs.textContent = 'VS';
        previewDiv.appendChild(vs);
        previewDiv.appendChild(buildPreviewEl(pair.right, pair.correct === 'right'));
      }

      // Actions
      const actions = document.createElement('div');
      actions.className = 'pair-actions';

      const editBtn   = makePairBtn('✏', 'edit',   'Modifier',   () => openModal(pair.id));
      const upBtn     = makePairBtn('↑', '',        'Monter',     () => movePair(pair.id, -1));
      const downBtn   = makePairBtn('↓', '',        'Descendre',  () => movePair(pair.id, 1));
      const deleteBtn = makePairBtn('✕', 'delete',  'Supprimer',  () => deletePair(pair.id));

      if (index === 0)              upBtn.disabled   = true;
      if (index === pairs.length - 1) downBtn.disabled = true;

      actions.append(editBtn, upBtn, downBtn, deleteBtn);
      row.appendChild(previewDiv);
      row.appendChild(actions);
      list.appendChild(row);
    });
  }

  function buildPreviewEl(item, isCorrect) {
    const div = document.createElement('div');
    div.className = 'pair-item-preview' + (isCorrect ? ' is-correct' : '');
    div.style.color          = item.color         || '#1a1a1a';
    div.style.fontSize       = Math.min(item.fontSize || 32, 22) + 'px';
    div.style.fontFamily     = item.fontFamily     || 'Arial';
    div.style.textTransform  = item.textTransform  || 'none';
    div.textContent          = item.text           || '';
    return div;
  }

  function makePairBtn(icon, extraClass, title, handler) {
    const btn = document.createElement('button');
    btn.className = 'pair-action-btn' + (extraClass ? ' ' + extraClass : '');
    btn.title     = title;
    btn.textContent = icon;
    btn.addEventListener('click', handler);
    return btn;
  }

  // ── Exercise CRUD ─────────────────────────────────────────────────────────────
  document.getElementById('btn-new-exercise').addEventListener('click', () => {
    const ex = {
      id:          newId('ex'),
      name:        'Nouvel exercice',
      instruction: '',
      pairs:       [],
    };
    exercises.push(ex);
    saveExercises(exercises);
    selectedExerciseId = ex.id;
    renderSidebar();
    renderEditor();
    setTimeout(() => {
      const input = document.getElementById('exercise-name');
      input.focus();
      input.select();
    }, 50);
  });

  function selectExercise(id) {
    selectedExerciseId = id;
    renderSidebar();
    renderEditor();
  }

  document.getElementById('exercise-name').addEventListener('input', () => {
    const ex = getSelected();
    if (!ex) return;
    ex.name = document.getElementById('exercise-name').value;
    saveExercises(exercises);
    renderSidebar();
  });

  document.getElementById('exercise-instruction').addEventListener('input', () => {
    const ex = getSelected();
    if (!ex) return;
    ex.instruction = document.getElementById('exercise-instruction').value;
    saveExercises(exercises);
  });

  document.getElementById('btn-delete-exercise').addEventListener('click', () => {
    const ex = getSelected();
    if (!ex) return;
    if (!confirm('Supprimer l\'exercice "' + ex.name + '" et toutes ses paires ?')) return;
    exercises = exercises.filter(e => e.id !== selectedExerciseId);
    selectedExerciseId = exercises.length > 0 ? exercises[0].id : null;
    saveExercises(exercises);
    renderSidebar();
    renderEditor();
  });

  // ── Pair CRUD ─────────────────────────────────────────────────────────────────
  document.getElementById('btn-add-pair').addEventListener('click', () => {
    const ex = getSelected();
    if (!ex) return;
    const pair = {
      id:      newId('pair'),
      left:    { text: '', color: '#1a1a1a', fontSize: 32, fontFamily: 'Arial', textTransform: 'none' },
      right:   { text: '', color: '#1a1a1a', fontSize: 32, fontFamily: 'Arial', textTransform: 'none' },
      correct: 'left',
    };
    ex.pairs.push(pair);
    saveExercises(exercises);
    renderEditor();
    openModal(pair.id);
  });

  function deletePair(pairId) {
    const ex = getSelected();
    if (!ex) return;
    if (!confirm('Supprimer cette paire ?')) return;
    ex.pairs = ex.pairs.filter(p => p.id !== pairId);
    saveExercises(exercises);
    renderEditor();
  }

  function movePair(pairId, direction) {
    const ex = getSelected();
    if (!ex) return;
    const i = ex.pairs.findIndex(p => p.id === pairId);
    const j = i + direction;
    if (j < 0 || j >= ex.pairs.length) return;
    [ex.pairs[i], ex.pairs[j]] = [ex.pairs[j], ex.pairs[i]];
    saveExercises(exercises);
    renderEditor();
  }

  // ── Modal ─────────────────────────────────────────────────────────────────────
  function openModal(pairId) {
    const ex   = getSelected();
    if (!ex) return;
    const pair = ex.pairs.find(p => p.id === pairId);
    if (!pair) return;
    editingPairId = pairId;

    const isArrow = pair.type === 'arrow';
    document.getElementById('pair-type').value = isArrow ? 'arrow' : 'choice';
    document.getElementById('arrow-config').style.display    = isArrow ? 'block' : 'none';
    document.getElementById('items-edit-grid').style.display = isArrow ? 'none'  : 'grid';

    if (isArrow) {
      selectOption('arrow-direction', pair.direction || 'left');
      selectOption('arrow-bg',        pair.bgColor   || 'blue');
      refreshArrowPreview();
    } else {
      fillModalSide('left',  pair.left  || {});
      fillModalSide('right', pair.right || {});
      document.getElementById('correct-' + (pair.correct || 'left')).checked = true;
      refreshPreview();
    }

    document.getElementById('pair-modal').style.display = 'flex';
  }

  document.getElementById('pair-type').addEventListener('change', () => {
    const isArrow = document.getElementById('pair-type').value === 'arrow';
    document.getElementById('arrow-config').style.display    = isArrow ? 'block' : 'none';
    document.getElementById('items-edit-grid').style.display = isArrow ? 'none'  : 'grid';
    if (isArrow) refreshArrowPreview();
    else         refreshPreview();
  });

  document.getElementById('arrow-direction').addEventListener('change', refreshArrowPreview);
  document.getElementById('arrow-bg').addEventListener('change', refreshArrowPreview);

  function fillModalSide(side, item) {
    document.getElementById(side + '-text').value = item.text || '';
    document.getElementById(side + '-color').value = item.color || '#1a1a1a';
    selectOption(side + '-size',      String(item.fontSize     || 32));
    selectOption(side + '-font',      item.fontFamily  || 'Arial');
    selectOption(side + '-transform', item.textTransform || 'none');
  }

  function selectOption(id, value) {
    const select = document.getElementById(id);
    for (const opt of select.options) {
      if (opt.value === value) { opt.selected = true; return; }
    }
  }

  function readModalSide(side) {
    return {
      text:          document.getElementById(side + '-text').value,
      color:         document.getElementById(side + '-color').value,
      fontSize:      parseInt(document.getElementById(side + '-size').value, 10),
      fontFamily:    document.getElementById(side + '-font').value,
      textTransform: document.getElementById(side + '-transform').value,
    };
  }

  function refreshPreview() {
    const left    = readModalSide('left');
    const right   = readModalSide('right');
    const correct = document.querySelector('input[name="modal-correct"]:checked')?.value || 'left';

    applyPreviewBox(document.getElementById('preview-left'),  left,  correct === 'left');
    applyPreviewBox(document.getElementById('preview-right'), right, correct === 'right');
  }

  function applyPreviewBox(el, item, isCorrect) {
    el.textContent          = item.text || '(vide)';
    el.style.color          = item.color;
    el.style.fontSize       = item.fontSize + 'px';
    el.style.fontFamily     = item.fontFamily;
    el.style.textTransform  = item.textTransform;
    el.className = 'preview-box' + (isCorrect ? ' correct-side' : '');
  }

  // Attach live-preview listeners to all modal inputs
  ['left-text','left-color','left-size','left-font','left-transform',
   'right-text','right-color','right-size','right-font','right-transform',
   'correct-left','correct-right'].forEach(id => {
    const el = document.getElementById(id);
    el.addEventListener('input',  refreshPreview);
    el.addEventListener('change', refreshPreview);
  });

  document.getElementById('btn-modal-save').addEventListener('click', () => {
    const ex   = getSelected();
    if (!ex) return;
    const pair = ex.pairs.find(p => p.id === editingPairId);
    if (!pair) return;

    const pairType = document.getElementById('pair-type').value;
    if (pairType === 'arrow') {
      pair.type      = 'arrow';
      pair.direction = document.getElementById('arrow-direction').value;
      pair.bgColor   = document.getElementById('arrow-bg').value;
      delete pair.left; delete pair.right; delete pair.correct;
    } else {
      pair.type    = 'choice';
      pair.left    = readModalSide('left');
      pair.right   = readModalSide('right');
      pair.correct = document.querySelector('input[name="modal-correct"]:checked')?.value || 'left';
      delete pair.direction; delete pair.bgColor;
    }

    saveExercises(exercises);
    renderEditor();
    closeModal();
  });

  document.getElementById('btn-modal-cancel').addEventListener('click', () => {
    // Remove pair if it was freshly added with no content
    const ex = getSelected();
    if (ex) {
      const pair = ex.pairs.find(p => p.id === editingPairId);
      const isEmpty = pair.type === 'arrow' ? !pair.direction : (!pair.left?.text && !pair.right?.text);
      if (pair && isEmpty) {
        ex.pairs = ex.pairs.filter(p => p.id !== editingPairId);
        saveExercises(exercises);
        renderEditor();
      }
    }
    closeModal();
  });

  function closeModal() {
    document.getElementById('pair-modal').style.display = 'none';
    editingPairId = null;
  }

  // Close modal on overlay click or Escape
  document.getElementById('pair-modal').addEventListener('click', e => {
    if (e.target === document.getElementById('pair-modal')) closeModal();
  });
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape' && document.getElementById('pair-modal').style.display !== 'none') closeModal();
  });

  // ── Export / Import ───────────────────────────────────────────────────────────
  document.getElementById('btn-export').addEventListener('click', () => {
    const blob = new Blob([JSON.stringify(exercises, null, 2)], { type: 'application/json' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href     = url;
    a.download = 'cys-exercices-' + new Date().toISOString().slice(0, 10) + '.json';
    a.click();
    URL.revokeObjectURL(url);
  });

  document.getElementById('btn-import').addEventListener('click', () => {
    document.getElementById('import-input').click();
  });

  document.getElementById('import-input').addEventListener('change', e => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = evt => {
      try {
        const imported = JSON.parse(evt.target.result);
        if (!Array.isArray(imported)) throw new Error('Format invalide');
        if (!confirm('Importer ' + imported.length + ' exercice(s) et les ajouter aux existants ?')) return;
        const existingIds = new Set(exercises.map(ex => ex.id));
        let added = 0;
        imported.forEach(ex => {
          if (!existingIds.has(ex.id)) { exercises.push(ex); added++; }
        });
        saveExercises(exercises);
        renderSidebar();
        renderEditor();
        alert(added + ' exercice(s) importé(s).');
      } catch (err) {
        alert('Fichier invalide : ' + err.message);
      }
    };
    reader.readAsText(file);
    e.target.value = '';
  });

  // ── Init ──────────────────────────────────────────────────────────────────────
  exercises          = getExercises();
  selectedExerciseId = exercises.length > 0 ? exercises[0].id : null;
  renderSidebar();
  renderEditor();
</script>
</body>
</html>
